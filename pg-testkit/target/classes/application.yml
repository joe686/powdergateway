server:
  port: 8081

spring:
  application:
    name: pg-testkit
  main:
    banner-mode: off

# PG-TestKit 自身配置
pg-testkit:
  # Mock 服务器端口（模拟上下游 B 系统，PG 端口分发转发到此）
  mock:
    port: 9999
  # PG 后端连接信息
  pg-backend:
    base-url: http://localhost:8080
    username: admin
    password: Admin@123
  # 数据库直连（用于数据校验）
  db:
    config-url: jdbc:mysql://localhost:3306/powergateway_config?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    audit-url: jdbc:mysql://localhost:3306/powergateway_audit?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: qwe12345
    driver-class-name: com.mysql.cj.jdbc.Driver

logging:
  level:
    com.powergateway.testkit: INFO
    org.springframework.web: WARN
