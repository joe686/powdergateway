# REL-1 · GitHub Actions 发布流水线
#
# 触发条件：push tag，形如：
#   v0.1.0           → 触发默认 SKU（便携 Win/Linux + 标准包）
#   v0.1.0-sqlite    → 触发 SQLite 分支便携版（暂未实现 job，见 TODO）
#   v0.1.0-testkit   → 触发内部测试版（含 pg-testkit，不上传到 Release，仅 artifact）
#
# 各 SKU job 独立运行，独立平台 runner（Windows for Win 包，Ubuntu for Linux 包）
# 冒烟测试通过后自动上传到 GitHub Release
#
# 注意：首次启用需在仓库 Settings → Actions 允许 workflow permissions=Read and Write

name: Release Multi-SKU

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-sqlite'
      - 'v*.*.*-testkit'

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'

jobs:
  # ─────────────────────────────────────────────────────
  # 便携版 · Windows x64
  # ─────────────────────────────────────────────────────
  build-portable-win:
    if: '!endsWith(github.ref, ''-sqlite'')'   # 默认 tag 或 -testkit 都要出 Win 便携
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 提取版本号
        shell: bash
        run: |
          VER=$(echo "${{ github.ref_name }}" | sed 's/^v//' | sed 's/-.*//')
          echo "VERSION=$VER" >> $GITHUB_ENV
          WITH_TESTKIT="false"
          if [[ "${{ github.ref_name }}" == *-testkit ]]; then WITH_TESTKIT="true"; fi
          echo "WITH_TESTKIT=$WITH_TESTKIT" >> $GITHUB_ENV
      - name: 组装便携 Win 版
        shell: bash
        run: |
          if [[ "$WITH_TESTKIT" == "true" ]]; then
            scripts/build/build-portable.sh --platform win-x64 --version $VERSION --with-testkit
          else
            scripts/build/build-portable.sh --platform win-x64 --version $VERSION
          fi
      - name: 冒烟测试
        shell: bash
        run: scripts/ci/verify-artifacts.sh dist/*win-x64*.zip
      - uses: actions/upload-artifact@v4
        with:
          name: portable-win-x64
          path: dist/*win-x64*.zip*

  # ─────────────────────────────────────────────────────
  # 便携版 · Linux x64
  # ─────────────────────────────────────────────────────
  build-portable-linux:
    if: '!endsWith(github.ref, ''-sqlite'')'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 提取版本号
        run: |
          VER=$(echo "${{ github.ref_name }}" | sed 's/^v//' | sed 's/-.*//')
          echo "VERSION=$VER" >> $GITHUB_ENV
          WITH_TESTKIT="false"
          if [[ "${{ github.ref_name }}" == *-testkit ]]; then WITH_TESTKIT="true"; fi
          echo "WITH_TESTKIT=$WITH_TESTKIT" >> $GITHUB_ENV
      - name: 组装便携 Linux 版
        run: |
          if [[ "$WITH_TESTKIT" == "true" ]]; then
            scripts/build/build-portable.sh --platform linux-x64 --version $VERSION --with-testkit
          else
            scripts/build/build-portable.sh --platform linux-x64 --version $VERSION
          fi
      - name: 冒烟测试
        run: scripts/ci/verify-artifacts.sh dist/*linux-x64*.zip
      - uses: actions/upload-artifact@v4
        with:
          name: portable-linux-x64
          path: dist/*linux-x64*.zip*

  # ─────────────────────────────────────────────────────
  # 标准版 · 通用
  # ─────────────────────────────────────────────────────
  build-standard:
    if: 'endsWith(github.ref, ''-testkit'') == false && endsWith(github.ref, ''-sqlite'') == false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 提取版本号
        run: |
          VER=$(echo "${{ github.ref_name }}" | sed 's/^v//' | sed 's/-.*//')
          echo "VERSION=$VER" >> $GITHUB_ENV
      - name: 组装标准版
        run: scripts/build/build-standard.sh --version $VERSION
      - uses: actions/upload-artifact@v4
        with:
          name: standard
          path: dist/*standard*.zip*

  # ─────────────────────────────────────────────────────
  # 发布到 GitHub Release（-testkit 版本不发布）
  # ─────────────────────────────────────────────────────
  publish-release:
    if: 'endsWith(github.ref, ''-testkit'') == false'
    needs: [build-portable-win, build-portable-linux, build-standard]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: portable-*
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: standard
      - name: 汇总产物到一个目录
        run: find dist -name "*.zip*" -exec cp {} . \;
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.zip.sha256
          generate_release_notes: true

# TODO: sqlite 分支 job（触发条件 endsWith(github.ref, '-sqlite')）
# 使用 mvn -Pdb-sqlite 打包，加 --db sqlite 参数
