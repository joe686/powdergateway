server:
  port: 8080

spring:
  application:
    name: powergateway
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:mysql://localhost:3306/powergateway_config?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
          username: root
          password: qwe12345
          driver-class-name: com.mysql.cj.jdbc.Driver
        audit:
          url: jdbc:mysql://localhost:3306/powergateway_audit?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
          username: root
          password: qwe12345
          driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    timeout: 3000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

powergateway:
  aes:
    key: PowerGateway128K

sa-token:
  token-name: satoken
  timeout: 86400
  is-concurrent: true
  is-share: true
  token-style: uuid

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  info:
    title: PowerGateway API
    description: 可视化接口开发平台
    version: 1.0.0
