# REL-1 · 便携版（standalone）Spring Profile
# 使用方式：java -jar powergateway.jar --spring.profiles.active=standalone
#
# 特点：
#   - 内嵌 H2 数据库（配置库 + 审计库 分别独立文件），MODE=MySQL 兼容
#   - 无 Redis：Caffeine-only 单层缓存
#   - h2-console 开启（浏览器打开 http://localhost:8080/h2-console 管理数据）
#   - Redis 自动配置排除，避免启动时尝试连 localhost:6379 报错

server:
  port: 8080

spring:
  application:
    name: powergateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:h2:file:./data/h2/pg_config;MODE=MySQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
          driver-class-name: org.h2.Driver
          username: sa
          password:
        audit:
          url: jdbc:h2:file:./data/h2/pg_audit;MODE=MySQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
          driver-class-name: org.h2.Driver
          username: sa
          password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false   # 只允许本机访问 h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init.sql
      continue-on-error: true     # 已存在的表 CREATE IF NOT EXISTS，报错继续

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl   # 便携版日志静默
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

powergateway:
  aes:
    key: PowerGateway128K

# REL-1 · Caffeine-only 关键开关（CacheConfig 上的 @ConditionalOnProperty 生效）
pg:
  cache:
    redis:
      enabled: false

sa-token:
  token-name: satoken
  timeout: 86400
  is-concurrent: true
  is-share: true
  token-style: uuid

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  info:
    title: PowerGateway 便携版
    description: PowerGateway 便携版 · 单机 H2 + Caffeine-only
    version: 1.0.0
